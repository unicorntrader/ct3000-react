<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CT3000 — Welcome UX variants</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; }
    .variant-switch button.active { background: #2563eb; color: white; border-color: transparent; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Top switcher ────────────────────────────────────────────── -->
  <div class="sticky top-0 z-50 bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-2 flex-wrap">
    <span class="text-xs text-gray-400 uppercase tracking-wider font-semibold mr-2">Preview:</span>
    <div class="variant-switch flex gap-2">
      <button data-variant="current" class="text-xs font-medium px-3 py-1.5 rounded-full border border-gray-200 bg-white text-gray-700 hover:bg-gray-50 active">A. Current modal</button>
      <button data-variant="banner"  class="text-xs font-medium px-3 py-1.5 rounded-full border border-gray-200 bg-white text-gray-700 hover:bg-gray-50">B. Top banner</button>
      <button data-variant="empty"   class="text-xs font-medium px-3 py-1.5 rounded-full border border-gray-200 bg-white text-gray-700 hover:bg-gray-50">C. Empty-state CTA</button>
    </div>
    <span class="text-xs text-gray-400 ml-auto hidden sm:inline">Fake data — variants shown on a mock Home screen.</span>
  </div>

  <!-- ═════════════ Mock app shell ═════════════════════════════ -->
  <!-- The mock Home screen renders the same in all three variants; only the overlay / interruption pattern changes. -->
  <div id="variant-banner-slot"></div>

  <header class="bg-white border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-6 h-14 flex items-center">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center mr-2.5">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
        </svg>
      </div>
      <span class="font-bold text-gray-900">CT3000</span>
      <nav class="ml-8 flex gap-5 text-sm text-gray-500">
        <span class="text-blue-600 font-medium">Home</span>
        <span>Plans</span>
        <span>Daily</span>
        <span>Journal</span>
        <span>Performance</span>
      </nav>
      <div class="ml-auto w-8 h-8 bg-gray-100 rounded-full"></div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-6">
    <h2 class="text-xl font-semibold text-gray-900 mb-4">Home</h2>
    <div id="main-content"></div>
  </main>

  <!-- ═════════════ Variant A: Current modal ═══════════════════ -->
  <div id="variant-current" class="hidden fixed inset-0 z-40 bg-white flex items-center justify-center px-6">
    <div class="w-full max-w-sm">
      <div class="flex items-center gap-2.5 mb-10">
        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
          </svg>
        </div>
        <span class="text-xl font-bold text-gray-900">CT3000</span>
      </div>

      <h1 class="text-2xl font-bold text-gray-900 mb-2">Welcome to CT3000</h1>
      <p class="text-sm text-gray-400 mb-8 leading-relaxed">
        Connect your IBKR account to import your trades and start journalling.
      </p>

      <div class="space-y-3">
        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-xl text-sm">
          Connect IBKR account
        </button>
        <button class="w-full bg-gray-50 hover:bg-gray-100 text-gray-500 font-medium py-3.5 rounded-xl text-sm border border-gray-200">
          Skip for now
        </button>
      </div>
    </div>
  </div>

  <!-- Templates rendered into slots by JS below ────────────────────────────────── -->

  <template id="tpl-banner">
    <div class="bg-blue-600 text-white">
      <div class="max-w-7xl mx-auto px-6 py-3 flex items-center gap-4">
        <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center shrink-0">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold">Welcome to CT3000 — you&rsquo;re on a trial.</p>
          <p class="text-xs text-blue-100 mt-0.5">Connect your IBKR account to import your trades and start journalling.</p>
        </div>
        <button class="bg-white text-blue-700 text-xs font-semibold px-4 py-1.5 rounded-lg hover:bg-blue-50 shrink-0">
          Connect IBKR →
        </button>
        <button aria-label="Dismiss" class="text-white/80 hover:text-white shrink-0 p-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </template>

  <!-- Mock Home content — shown behind banner (variant B) or behind nothing (variant C uses its own empty state replacement) -->
  <template id="tpl-home-with-data">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 mb-1">Today&rsquo;s P&amp;L</p>
        <p class="text-2xl font-semibold text-gray-300">—</p>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 mb-1">Open positions</p>
        <p class="text-2xl font-semibold text-gray-300">0</p>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 mb-1">Active plans</p>
        <p class="text-2xl font-semibold text-gray-300">0</p>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 mb-1">30-day win rate</p>
        <p class="text-2xl font-semibold text-gray-300">—</p>
      </div>
    </div>
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
      <h3 class="text-sm font-semibold text-gray-700 mb-3">Open positions</h3>
      <p class="text-sm text-gray-400 text-center py-10">No open positions yet.</p>
    </div>
  </template>

  <template id="tpl-empty-cta">
    <div class="bg-white rounded-2xl p-12 shadow-sm border border-gray-100 max-w-xl mx-auto mt-8 text-center">
      <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-5">
        <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
        </svg>
      </div>
      <h3 class="text-xl font-semibold text-gray-900 mb-2">You&rsquo;re all set up.</h3>
      <p class="text-sm text-gray-500 mb-7 max-w-sm mx-auto leading-relaxed">
        Now let&rsquo;s import your trades. Connect your Interactive Brokers account and we&rsquo;ll pull in your history so you can start journalling.
      </p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <button class="bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm px-6 py-3 rounded-xl">
          Connect IBKR account
        </button>
        <button class="bg-white hover:bg-gray-50 text-gray-600 font-medium text-sm px-6 py-3 rounded-xl border border-gray-200">
          I&rsquo;ll do this later
        </button>
      </div>
      <p class="text-xs text-gray-400 mt-6">
        IBKR is currently required. We pull your trades automatically — you never upload a file.
      </p>
    </div>
  </template>

  <script>
    const bannerSlot  = document.getElementById('variant-banner-slot');
    const mainContent = document.getElementById('main-content');
    const tplBanner   = document.getElementById('tpl-banner').content;
    const tplHome     = document.getElementById('tpl-home-with-data').content;
    const tplEmpty    = document.getElementById('tpl-empty-cta').content;
    const modal       = document.getElementById('variant-current');

    function render(variant) {
      bannerSlot.innerHTML = '';
      mainContent.innerHTML = '';
      modal.classList.add('hidden');

      if (variant === 'current') {
        // Modal overlays the home content
        mainContent.appendChild(tplHome.cloneNode(true));
        modal.classList.remove('hidden');
      } else if (variant === 'banner') {
        bannerSlot.appendChild(tplBanner.cloneNode(true));
        mainContent.appendChild(tplHome.cloneNode(true));
      } else if (variant === 'empty') {
        // No banner, no modal — the home screen itself IS the CTA
        mainContent.appendChild(tplEmpty.cloneNode(true));
      }

      document.querySelectorAll('.variant-switch button').forEach(b => {
        b.classList.toggle('active', b.dataset.variant === variant);
      });
    }

    document.querySelectorAll('.variant-switch button').forEach(b => {
      b.addEventListener('click', () => render(b.dataset.variant));
    });

    render('current');
  </script>
</body>
</html>
