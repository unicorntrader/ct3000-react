<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Wizard — Preview v2</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
</style>
</head>
<body class="bg-gray-50 min-h-screen py-6 px-4">

<div class="max-w-2xl mx-auto">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <button class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-gray-800">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Back to Home
    </button>
    <span class="text-xs text-gray-400">Trade 1 of 1</span>
  </div>

  <h2 class="text-xl font-semibold text-gray-900 mb-1">Review trades</h2>
  <p class="text-sm text-gray-400 mb-6">Pick the plan you intended, or mark off-plan if none applied.</p>

  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">

    <!-- Progress dots -->
    <div class="flex space-x-1.5 mb-5">
      <div class="h-1.5 rounded-full" style="width: 24px; background: #2563eb;"></div>
    </div>

    <!-- Trade card — now with Entry / Exit / Qty / Dir / P&L / R -->
    <div class="bg-gray-50 rounded-xl p-5 mb-6 border border-gray-100">
      <div class="flex justify-between items-start mb-4">
        <div class="flex items-center gap-2">
          <span class="text-lg font-semibold text-gray-900">NVDA</span>
          <span class="text-xs font-medium px-2 py-0.5 rounded-full bg-blue-50 text-blue-600">LONG</span>
          <span class="text-xs font-medium px-2 py-0.5 rounded-full bg-green-100 text-green-800">win</span>
          <span class="text-xs font-medium px-2 py-0.5 rounded-full bg-purple-50 text-purple-700">Ambiguous</span>
        </div>
        <span class="text-xs text-gray-400">Apr 8, 2026</span>
      </div>
      <div class="grid grid-cols-5 gap-2">
        <div class="bg-white rounded-lg px-2 py-2 text-center border border-gray-100">
          <p class="text-[10px] text-gray-400 leading-none mb-1">Entry</p>
          <p class="text-sm font-semibold text-gray-900">$145.00</p>
        </div>
        <div class="bg-white rounded-lg px-2 py-2 text-center border border-gray-100">
          <p class="text-[10px] text-gray-400 leading-none mb-1">Exit</p>
          <p class="text-sm font-semibold text-gray-900">$155.42</p>
        </div>
        <div class="bg-white rounded-lg px-2 py-2 text-center border border-gray-100">
          <p class="text-[10px] text-gray-400 leading-none mb-1">Qty</p>
          <p class="text-sm font-semibold text-gray-900">120</p>
        </div>
        <div class="bg-white rounded-lg px-2 py-2 text-center border border-gray-100">
          <p class="text-[10px] text-gray-400 leading-none mb-1">P&L</p>
          <p class="text-sm font-semibold text-green-600">+$1,250</p>
        </div>
        <div class="bg-white rounded-lg px-2 py-2 text-center border border-gray-100">
          <p class="text-[10px] text-gray-400 leading-none mb-1">R</p>
          <p class="text-sm font-semibold text-green-600">2.1R</p>
        </div>
      </div>
    </div>

    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">
      3 plans matched — pick the one you intended:
    </p>

    <div class="space-y-2 mb-5">

      <!-- Plan 1 — just numbers, no title -->
      <label class="flex items-start gap-3 p-4 rounded-xl border border-gray-200 cursor-pointer hover:border-blue-200 hover:bg-blue-50/30 transition-colors">
        <input type="radio" name="candidate" class="mt-0.5 flex-shrink-0">
        <div class="flex-1 min-w-0">
          <div class="grid grid-cols-4 gap-2 mb-2">
            <div class="bg-gray-50 rounded-lg px-2 py-1.5 text-center">
              <p class="text-[10px] text-gray-400 leading-none mb-0.5">Entry</p>
              <p class="text-xs font-medium text-gray-900">$143</p>
            </div>
            <div class="bg-gray-50 rounded-lg px-2 py-1.5 text-center">
              <p class="text-[10px] text-gray-400 leading-none mb-0.5">Target</p>
              <p class="text-xs font-medium text-green-600">$150</p>
            </div>
            <div class="bg-gray-50 rounded-lg px-2 py-1.5 text-center">
              <p class="text-[10px] text-gray-400 leading-none mb-0.5">Stop</p>
              <p class="text-xs font-medium text-red-500">$140</p>
            </div>
            <div class="bg-gray-50 rounded-lg px-2 py-1.5 text-center">
              <p class="text-[10px] text-gray-400 leading-none mb-0.5">Qty</p>
              <p class="text-xs font-medium text-gray-900">100</p>
            </div>
          </div>
          <div class="flex items-baseline justify-between">
            <p class="text-[11px] text-gray-400">
              Actual: <span class="text-gray-700 font-medium">$145 · 120 sh</span>
              <span class="text-amber-600">· entry +1.4%, qty +20%</span>
            </p>
            <p class="text-[10px] text-gray-400">Created Apr 5</p>
          </div>
        </div>
      </label>

      <!-- Plan 2 -->
      <label class="flex items-start gap-3 p-4 rounded-xl border border-gray-200 cursor-pointer hover:border-blue-200 hover:bg-blue-50/30 transition-colors">
        <input type="radio" name="candidate" class="mt-0.5 flex-shrink-0">
        <div class="flex-1 min-w-0">
          <div class="grid grid-cols-4 gap-2 mb-2">
            <div class="bg-gray-50 rounded-lg px-2 py-1.5 text-center">
              <p class="text-[10px] text-gray-400 leading-none mb-0.5">Entry</p>
              <p class="text-xs font-medium text-gray-900">$140</p>
            </div>
            <div class="bg-gray-50 rounded-lg px-2 py-1.5 text-center">
              <p class="text-[10px] text-gray-400 leading-none mb-0.5">Target</p>
              <p class="text-xs font-medium text-green-600">$165</p>
            </div>
            <div class="bg-gray-50 rounded-lg px-2 py-1.5 text-center">
              <p class="text-[10px] text-gray-400 leading-none mb-0.5">Stop</p>
              <p class="text-xs font-medium text-red-500">$135</p>
            </div>
            <div class="bg-gray-50 rounded-lg px-2 py-1.5 text-center">
              <p class="text-[10px] text-gray-400 leading-none mb-0.5">Qty</p>
              <p class="text-xs font-medium text-gray-900">500</p>
            </div>
          </div>
          <div class="flex items-baseline justify-between">
            <p class="text-[11px] text-gray-400">
              Actual: <span class="text-gray-700 font-medium">$145 · 120 sh</span>
              <span class="text-red-500">· entry +3.6%, qty −76%</span>
            </p>
            <p class="text-[10px] text-gray-400">Created Apr 3</p>
          </div>
        </div>
      </label>

      <!-- Plan 3 — selected (qty matches exactly) -->
      <label class="flex items-start gap-3 p-4 rounded-xl border border-blue-300 bg-blue-50 cursor-pointer shadow-sm">
        <input type="radio" name="candidate" class="mt-0.5 flex-shrink-0" checked>
        <div class="flex-1 min-w-0">
          <div class="grid grid-cols-4 gap-2 mb-2">
            <div class="bg-white rounded-lg px-2 py-1.5 text-center border border-blue-100">
              <p class="text-[10px] text-gray-400 leading-none mb-0.5">Entry</p>
              <p class="text-xs font-medium text-gray-900">$142</p>
            </div>
            <div class="bg-white rounded-lg px-2 py-1.5 text-center border border-blue-100">
              <p class="text-[10px] text-gray-400 leading-none mb-0.5">Target</p>
              <p class="text-xs font-medium text-green-600">$148</p>
            </div>
            <div class="bg-white rounded-lg px-2 py-1.5 text-center border border-blue-100">
              <p class="text-[10px] text-gray-400 leading-none mb-0.5">Stop</p>
              <p class="text-xs font-medium text-red-500">$139</p>
            </div>
            <div class="bg-white rounded-lg px-2 py-1.5 text-center border border-blue-100">
              <p class="text-[10px] text-gray-400 leading-none mb-0.5">Qty</p>
              <p class="text-xs font-medium text-gray-900">120</p>
            </div>
          </div>
          <div class="flex items-baseline justify-between">
            <p class="text-[11px] text-gray-400">
              Actual: <span class="text-gray-700 font-medium">$145 · 120 sh</span>
              <span class="text-green-600 font-medium">· entry +2.1%, qty ±0%</span>
            </p>
            <p class="text-[10px] text-gray-400">Created Apr 1</p>
          </div>
        </div>
      </label>
    </div>

    <!-- Action buttons -->
    <div class="flex gap-2">
      <button class="flex-1 bg-blue-600 text-white font-semibold py-3 rounded-xl text-sm hover:bg-blue-700 flex items-center justify-center gap-1.5">
        Match <span class="text-[10px] opacity-50 border border-white/30 rounded px-1 ml-0.5">↵</span>
      </button>
      <button class="flex-1 border border-gray-200 text-gray-700 font-medium py-3 rounded-xl text-sm hover:bg-gray-50 flex items-center justify-center gap-1.5">
        No plan <span class="text-[10px] text-gray-400 border border-gray-200 rounded px-1">N</span>
      </button>
      <button class="border border-gray-200 text-gray-400 font-medium py-3 px-4 rounded-xl text-sm hover:bg-gray-50">
        Skip
      </button>
    </div>

    <p class="text-[11px] text-gray-300 text-center mt-3">
      <kbd class="px-1 py-0.5 bg-gray-50 border border-gray-200 rounded text-gray-500">↵</kbd> match ·
      <kbd class="ml-2 px-1 py-0.5 bg-gray-50 border border-gray-200 rounded text-gray-500">N</kbd> no plan ·
      <kbd class="ml-2 px-1 py-0.5 bg-gray-50 border border-gray-200 rounded text-gray-500">Esc</kbd> back
    </p>
  </div>
</div>

</body>
</html>
